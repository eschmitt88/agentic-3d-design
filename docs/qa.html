<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QA sheet · agentic-3d-design</title>
<!--
  Per-design QA sheet for human review. Interactive STL viewer (three.js) +
  gate metrics + key dimensions + downloads. Context-aware file source:
    - on *.github.io  -> raw.githubusercontent.com/<owner>/<repo>/<branch>/...
    - served elsewhere (aiserver qa_serve.py) -> /experiments/<slug>/results/...
  Usage: qa.html?slug=2026-06-16-snap-fit-enclosure
  Local/test overrides: &owner=&repo=&branch=&base=
-->
<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#262b36; --fg:#e6e9ef; --mut:#9aa3b2; --ok:#3fb950; --bad:#f85149; --accent:#58a6ff; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }
  header { padding:14px 20px; border-bottom:1px solid var(--line); display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header .slug { color:var(--mut); font-family:ui-monospace,monospace; }
  .badge { padding:2px 10px; border-radius:999px; font-weight:600; font-size:12px; }
  .badge.pass { background:rgba(63,185,80,.15); color:var(--ok); border:1px solid var(--ok); }
  .badge.fail { background:rgba(248,81,73,.15); color:var(--bad); border:1px solid var(--bad); }
  main { display:grid; grid-template-columns: 1fr 360px; gap:0; height:calc(100vh - 52px); }
  #stage { position:relative; background:#0b0d11; }
  #canvasWrap { position:absolute; inset:0; }
  #modelBar { position:absolute; top:10px; left:10px; display:flex; gap:8px; flex-wrap:wrap; z-index:5; }
  .ctlgroup { display:flex; gap:4px; align-items:center; background:rgba(15,17,21,.72); border:1px solid var(--line); border-radius:8px; padding:3px; }
  #modelBar button { background:var(--panel); color:var(--fg); border:1px solid var(--line); padding:5px 11px; border-radius:6px; cursor:pointer; font-size:12px; }
  #modelBar button:hover { border-color:#3a4150; }
  #modelBar button.active { border-color:var(--accent); color:var(--accent); }
  .swatch { display:inline-block; width:9px; height:9px; border-radius:2px; margin-right:6px; vertical-align:middle; border:1px solid rgba(0,0,0,.3); }
  .ctllab { color:var(--mut); font-size:12px; padding:0 6px; }
  #modelBar input[type=range] { accent-color:var(--accent); width:92px; margin:0 6px; }
  #hint { position:absolute; bottom:10px; left:10px; color:var(--mut); font-size:11px; z-index:5; }
  aside { border-left:1px solid var(--line); overflow:auto; padding:16px; background:var(--panel); }
  aside h2 { font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--mut); margin:18px 0 8px; }
  aside h2:first-child { margin-top:0; }
  table { width:100%; border-collapse:collapse; }
  td { padding:3px 0; vertical-align:top; }
  td.k { color:var(--mut); }
  td.v { text-align:right; font-family:ui-monospace,monospace; }
  .g-ok { color:var(--ok); } .g-bad { color:var(--bad); }
  .note { background:rgba(88,166,255,.08); border:1px solid #1f3550; border-radius:6px; padding:8px 10px; color:var(--mut); font-size:12.5px; }
  .warn { background:rgba(210,153,34,.10); border:1px solid #5a4a1f; color:#d9b25a; }
  a.dl { display:inline-block; margin:2px 6px 2px 0; padding:3px 8px; border:1px solid var(--line); border-radius:5px; color:var(--accent); text-decoration:none; font-size:12px; }
  a.dl:hover { border-color:var(--accent); }
  img.render { width:100%; border:1px solid var(--line); border-radius:6px; margin-top:6px; background:#fff; }
  .err { color:var(--bad); padding:20px; }
  #fileErr { color:var(--bad); font-size:12px; }
</style>
<!-- Map the bare 'three' specifier (used internally by STLLoader/OrbitControls)
     to the locally vendored build — no CDN dependency, works offline/on-LAN. -->
<script type="importmap">
{ "imports": { "three": "./vendor/three/three.module.js" } }
</script>
<script>
  // Turn a silent blank screen into an actionable message if a script/module
  // fails to load (e.g. vendored three.js missing).
  window.addEventListener('error', function (e) {
    var t = e && e.target;
    if (t && (t.tagName === 'SCRIPT' || t.tagName === 'LINK')) {
      var p = document.getElementById('panel');
      if (p) p.innerHTML = '<p class="err">Failed to load ' + (t.src || t.href) +
        '. The 3D viewer libs may be missing under docs/vendor/three/.</p>';
    }
  }, true);
</script>
</head>
<body>
<header>
  <h1>QA sheet</h1>
  <span class="slug" id="slug">…</span>
  <span id="statusBadge"></span>
  <span id="fileErr"></span>
  <span style="flex:1"></span>
  <a class="dl" id="repoLink" href="#" target="_blank" rel="noopener">repo ↗</a>
</header>
<main>
  <section id="stage">
    <div id="canvasWrap"></div>
    <div id="modelBar"></div>
    <div id="hint">drag = rotate · scroll = zoom · right-drag = pan</div>
  </section>
  <aside id="panel"><p style="color:var(--mut)">Loading metrics…</p></aside>
</main>

<script type="module">
import * as THREE from 'three';
import { STLLoader } from './vendor/three/STLLoader.js';
import { OrbitControls } from './vendor/three/OrbitControls.js';

const q = new URLSearchParams(location.search);
const slug = q.get('slug');
const branch = q.get('branch') || 'main';

function fileBase() {
  if (q.get('base')) return q.get('base');
  let owner = q.get('owner'), repo = q.get('repo');
  if ((!owner || !repo) && location.hostname.endsWith('github.io')) {
    owner = owner || location.hostname.split('.')[0];
    repo = repo || location.pathname.split('/').filter(Boolean)[0];
  }
  if (owner && repo) {
    document.getElementById('repoLink').href = `https://github.com/${owner}/${repo}/tree/${branch}/experiments/${slug}`;
    return `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/experiments/${slug}/results/`;
  }
  // served from repo root by the aiserver qa_serve.py
  document.getElementById('repoLink').href = `/experiments/${slug}/`;
  return `/experiments/${slug}/results/`;
}
const BASE = slug ? fileBase() : null;
document.getElementById('slug').textContent = slug || '(no ?slug= given)';

// Parts of the assembly — each loaded as its own colored mesh. Files that are
// absent are skipped; if no per-part files exist we fall back to a single mesh.
const PARTS = [
  { key:'box', label:'Box', file:'box.stl', color:0x6f9ad6 },
  { key:'lid', label:'Lid', file:'lid.stl', color:0xe0a458 },
];
const FALLBACK = { key:'model', label:'Model', file:'assembled_closed.stl', color:0x9bb4d4 };

// ---- three.js scene ----
const wrap = document.getElementById('canvasWrap');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0d11);
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 5000);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(window.devicePixelRatio);
wrap.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const keyLight = new THREE.DirectionalLight(0xffffff, 0.85); keyLight.position.set(1,1.4,1); scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xffffff, 0.35); fillLight.position.set(-1,-0.6,-1); scene.add(fillLight);
const grid = new THREE.GridHelper(200, 20, 0x303642, 0x20242e); scene.add(grid);
// CAD is Z-up; three.js is Y-up. Rotate the whole assembly once so +Z(model)→+Y(world).
const assembly = new THREE.Group(); assembly.rotation.x = -Math.PI/2; scene.add(assembly);
const loader = new STLLoader();

let parts = [];                                   // {key,label,color,mesh,edges,index}
const view = { edges:false, wire:false, explode:0, isolate:null };
let modelHeight = 50;                             // vertical (model-Z) extent, for explode scaling

function resize() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false); camera.aspect = w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);

function frameObject(obj) {
  const box = new THREE.Box3().setFromObject(obj);
  if (box.isEmpty()) return;
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z) || 10;
  controls.target.copy(center);
  const dist = maxDim * 2.2;
  camera.position.set(center.x + dist*0.8, center.y + dist*0.7, center.z + dist*0.9);
  camera.near = maxDim/100; camera.far = maxDim*100; camera.updateProjectionMatrix();
  grid.position.set(center.x, box.min.y, center.z);
  controls.update();
}

function applyView() {
  for (const p of parts) {
    const visible = !view.isolate || view.isolate === p.key;
    p.mesh.visible = visible;
    p.mesh.material.wireframe = view.wire;
    p.edges.visible = visible && view.edges && !view.wire;
    // explode upward along model +Z, ordered bottom→top by part index
    p.mesh.position.z = view.explode * modelHeight * 0.6 * p.index;
  }
}

const setFileErr = (t) => { const e = document.getElementById('fileErr'); if (e) e.textContent = t; };

function addPart(def, geo) {
  geo.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({ color:def.color, metalness:0.1, roughness:0.55 });
  const mesh = new THREE.Mesh(geo, mat);
  const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geo, 30),
    new THREE.LineBasicMaterial({ color:0x0c1016 }));
  edges.visible = false;
  mesh.add(edges);
  assembly.add(mesh);
  geo.computeBoundingBox();
  const cz = geo.boundingBox.getCenter(new THREE.Vector3()).z;   // model-Z centre, for ordering
  parts.push({ ...def, mesh, edges, cz, index:0 });
}

async function loadParts() {
  setFileErr('');
  const present = [];
  for (const def of PARTS) {
    try { const r = await fetch(BASE + def.file, { method:'HEAD' }); if (r.ok) present.push(def); } catch {}
  }
  const defs = present.length ? present : [FALLBACK];
  await Promise.all(defs.map(def => new Promise(res => {
    loader.load(BASE + def.file, (geo) => { addPart(def, geo); res(); },
      undefined, () => { setFileErr(`could not load ${def.file}`); res(); });
  })));
  if (!parts.length) {
    document.getElementById('canvasWrap').insertAdjacentHTML('beforeend',
      '<p class="err" style="position:absolute;top:50%;left:0;right:0;text-align:center">No STL models found.</p>');
    return;
  }
  parts.sort((a,b) => a.cz - b.cz);          // bottom→top
  parts.forEach((p,i) => { p.index = i; });
  modelHeight = new THREE.Box3().setFromObject(assembly).getSize(new THREE.Vector3()).y || 50;
  applyView();
  frameObject(assembly);
  buildControls();
}

(function animate(){ requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); })();
resize();

// ---- viewer controls (part isolation + edges/wireframe + explode) ----
function buildControls() {
  const bar = document.getElementById('modelBar');
  bar.innerHTML = '';
  const swatch = (c) => `<span class="swatch" style="background:#${c.toString(16).padStart(6,'0')}"></span>`;
  const mkBtn = (html, active, fn) => {
    const b = document.createElement('button'); b.innerHTML = html;
    if (active) b.classList.add('active');
    b.onclick = () => fn(b); return b;
  };
  const grp = (kids) => { const d = document.createElement('div'); d.className = 'ctlgroup'; kids.forEach(k => d.appendChild(k)); return d; };

  // part isolation (+ colour legend via swatches)
  if (parts.length > 1) {
    const viewBtns = [];
    const setIsolate = (key, btn) => { view.isolate = key; viewBtns.forEach(x => x.classList.remove('active')); btn.classList.add('active'); applyView(); };
    const allBtn = mkBtn('Assembly', true, b => setIsolate(null, b)); viewBtns.push(allBtn);
    const partBtns = parts.map(p => { const b = mkBtn(swatch(p.color)+p.label, false, bb => setIsolate(p.key, bb)); viewBtns.push(b); return b; });
    bar.appendChild(grp([allBtn, ...partBtns]));
  }

  // edges / wireframe toggles
  const edgesBtn = mkBtn('Edges', false, b => { view.edges = !view.edges; b.classList.toggle('active', view.edges); applyView(); });
  const wireBtn = mkBtn('Wireframe', false, b => { view.wire = !view.wire; b.classList.toggle('active', view.wire); applyView(); });
  bar.appendChild(grp([edgesBtn, wireBtn]));

  // explode slider (only meaningful for multi-part)
  if (parts.length > 1) {
    const g = document.createElement('div'); g.className = 'ctlgroup';
    const lab = document.createElement('span'); lab.className = 'ctllab'; lab.textContent = 'Explode';
    const sl = document.createElement('input'); sl.type = 'range'; sl.min = '0'; sl.max = '1'; sl.step = '0.01'; sl.value = '0';
    sl.oninput = () => { view.explode = parseFloat(sl.value); applyView(); };
    g.appendChild(lab); g.appendChild(sl); bar.appendChild(g);
  }
}

// ---- metrics panel ----
const num = (x, d=2) => (typeof x === 'number' ? x.toFixed(d).replace(/\.?0+$/,'') : x);
function row(k, v, cls='') { return `<tr><td class="k">${k}</td><td class="v ${cls}">${v}</td></tr>`; }

async function loadPanel() {
  const panel = document.getElementById('panel');
  let m;
  try { m = await (await fetch(BASE + '../metrics.json')).json(); }
  catch { panel.innerHTML = '<p class="err">metrics.json not found.</p>'; return; }

  const pass = m.all_gates_pass;
  const badge = document.getElementById('statusBadge');
  badge.className = 'badge ' + (pass ? 'pass' : 'fail');
  badge.textContent = pass ? 'ALL GATES PASS' : 'GATES FAILING';

  const gr = m.gate_results || {};
  const gateRows = Object.entries(gr).map(([k,v]) =>
    row(k, v ? '✓' : '✗', v ? 'g-ok' : 'g-bad')).join('');

  const fn = m.final_numbers || {};
  const dimRows = [
    ['clearance (mm)', fn.clearance_radial_mm],
    ['min wall (mm)', fn.min_wall_mm],
    ['max overhang (°)', fn.max_overhang_deg],
    ['interference (mm³)', fn.interference_volume_mm3],
    ['snap hook depth (mm)', fn.snap_hook_depth_mm],
    ['snap peak strain', fn.snap_peak_strain],
    ['strain margin', fn.strain_margin],
  ].filter(([,v]) => v !== undefined).map(([k,v]) => row(k, num(v,3))).join('');

  const fp = m.final_params || {};
  const sizeRows = ['outer_L','outer_W','outer_H','wall_t']
    .filter(k => fp[k] !== undefined).map(k => row(k, num(fp[k]))).join('');

  const proc = m.process || {};
  const strengthWarn = (m.strength_method && m.strength_method !== 'fea')
    ? `<div class="note warn" style="margin-top:8px"><b>Strength = ${m.strength_method}</b>. ${m.strength_note || 'Not a full FEA run — screen only.'}</div>` : '';

  const dl = (f, label) => `<a class="dl" href="${BASE+f}" download>${label}</a>`;
  const downloads = [
    dl('box.step','box.step'), dl('lid.step','lid.step'),
    dl('assembled_closed.step','assembled.step'), dl('assembled_exploded.step','exploded.step'),
    dl('box.stl','box.stl'), dl('lid.stl','lid.stl'),
  ].join('');

  panel.innerHTML = `
    <h2>Gates</h2><table>${gateRows}</table>
    <h2>Key dimensions</h2><table>${dimRows}</table>
    ${strengthWarn}
    <h2>Outer size (mm)</h2><table>${sizeRows}</table>
    <h2>Loop</h2><table>
      ${row('cycles to all-pass', proc.n_revise_cycles ?? m.cycles_to_first_all_pass ?? '—')}
      ${row('failures caught', proc.failures_caught_by_loop ?? '—')}
      ${row('left to human', proc.failures_left_to_human ?? '—')}
      ${row('seed', m.seed ?? '—')}
    </table>
    <h2>Downloads (for FreeCAD / OrcaSlicer)</h2>
    <div class="note">STEP = exact B-rep for measuring &amp; slicing. STL = mesh.</div>
    <div style="margin-top:6px">${downloads}</div>
    <h2>Reference render</h2>
    <img class="render" src="${BASE}three_view.png" alt="three-view render" onerror="this.style.display='none'">
  `;
}

async function showChooser() {
  const panel = document.getElementById('panel');
  document.querySelector('#stage').innerHTML =
    '<div style="padding:24px;color:#9aa3b2">Pick a design from the list →</div>';
  document.getElementById('slug').textContent = '— choose a design —';
  let owner = q.get('owner'), repo = q.get('repo');
  if ((!owner || !repo) && location.hostname.endsWith('github.io')) {
    owner = owner || location.hostname.split('.')[0];
    repo = repo || location.pathname.split('/').filter(Boolean)[0];
  }
  if (!owner || !repo) {
    panel.innerHTML = '<p class="err">Add <code>?slug=&lt;experiment&gt;</code> to the URL.</p>';
    return;
  }
  try {
    const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/experiments?ref=${branch}`);
    const items = await r.json();
    const slugs = (Array.isArray(items) ? items : [])
      .filter(it => it.type === 'dir' && /^\d{4}-\d{2}-\d{2}-/.test(it.name))
      .map(it => it.name).sort().reverse();
    panel.innerHTML = '<h2>Designs</h2>' + (slugs.length
      ? slugs.map(s => `<div style="margin:4px 0"><a class="dl" href="?slug=${encodeURIComponent(s)}">${s}</a></div>`).join('')
      : '<p style="color:#9aa3b2">No experiments found.</p>');
  } catch {
    panel.innerHTML = '<p class="err">Could not list experiments.</p>';
  }
}

if (!slug) {
  showChooser();
} else {
  loadParts();
  loadPanel();
}
</script>
</body>
</html>
